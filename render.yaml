databases:
  - name: ai-radar-db
    plan: free
    databaseName: ai_radar
    user: radar
    postgresMajorVersion: 16

services:
  - type: web
    name: ai-radar-backend
    plan: free
    runtime: docker
    dockerfilePath: ./docker/Dockerfile.backend
    dockerContext: ./backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ai-radar-db
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: YOUTUBE_API_KEY
        sync: false
      - key: TWITTER_BEARER_TOKEN
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: FRONTEND_URL
        value: https://ai-intelligence-radar.netlify.app
      - key: ENVIRONMENT
        value: production
